aid: lansing-trade-group
name: Lansing Trade Group
description: >-
  Lansing Trade Group was an international merchandiser, marketer, and
  logistics company specializing in bulk commodities including grains,
  biofuels, and energy products. In 2022, The Andersons completed the
  acquisition of Lansing Trade Group; its commodities business now operates
  as part of The Andersons' Trade Group.
